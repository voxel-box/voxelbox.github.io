<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Case Study — VoxelBox (Demo)</title>
  <meta name="description" content="An illustrative demo case study from VoxelBox: the problem, solution, results, and tools used for an AI automation build.">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#07080c">
  <link rel="canonical" href="https://voxelbox.org/agency/case-study.html">

  <meta property="og:type" content="article">
  <meta property="og:site_name" content="VoxelBox">
  <meta property="og:title" content="Case Study — VoxelBox (Demo)">
  <meta property="og:description" content="An illustrative demo case study from VoxelBox.">
  <meta property="og:image" content="https://voxelbox.org/social-preview.png">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-layer" aria-hidden="true">
    <div class="bg-grid"></div>
    <span class="orb o1"></span>
    <span class="orb o2"></span>
    <span class="orb o3"></span>
  </div>

  <header class="site-header scrolled" data-header>
    <div class="wrap nav">
      <a class="brand" href="index.html" aria-label="VoxelBox home">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M12 2l9 5v10l-9 5-9-5V7z"/><path d="M12 12l9-5M12 12v10M12 12L3 7"/></svg>
        </span>
        Voxel<b>Box</b>
      </a>
      <nav class="nav-links" data-nav-links aria-label="Primary">
        <a class="nav-link" href="index.html#services">Services</a>
        <a class="nav-link" href="index.html#portfolio">Projects</a>
        <a class="nav-link" href="index.html#about">About</a>
        <a class="btn btn--primary btn--sm" href="index.html#contact">Book a Consultation</a>
      </nav>
      <button class="nav-toggle" data-nav-toggle aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main id="main" class="section wrap" style="min-height:60vh">
    <a class="btn btn--ghost btn--sm" href="index.html#portfolio" style="margin-bottom:24px">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
      Back to projects
    </a>
    <!-- Case study renders here from CASE_STUDIES/PROJECTS in data.js -->
    <article class="card" data-cs-mount style="overflow:hidden"></article>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <div class="foot-bottom" style="border-top:0;margin-top:0">
        <span>&copy; <span data-year>2026</span> VoxelBox. Hosted by VoxelBox.</span>
        <span>A VoxelBox project — <a href="https://voxelbox.co" rel="noopener" target="_blank">voxelbox.co</a></span>
      </div>
    </div>
  </footer>

  <script src="data.js" defer></script>
  <script defer>
    // Reusable case-study renderer: reads ?id=<project id> and renders from data.js.
    document.addEventListener("DOMContentLoaded", function () {
      var y = document.querySelector("[data-year]");
      if (y) y.textContent = new Date().getFullYear();

      function esc(s) {
        return String(s).replace(/[&<>"']/g, function (m) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m];
        });
      }
      var DATA = window.VOXELBOX_DATA || { PROJECTS: [], CASE_STUDIES: {} };
      var mount = document.querySelector("[data-cs-mount]");
      var params = new URLSearchParams(window.location.search);
      var id = params.get("id");
      var project = DATA.PROJECTS.filter(function (p) { return p.id === id; })[0];
      var cs = DATA.CASE_STUDIES[id];

      if (!project || !cs) {
        mount.innerHTML =
          '<div style="padding:40px 32px;text-align:center">' +
          '<h2>Case study not found</h2>' +
          '<p style="color:var(--text-dim);margin-top:12px">Pick a project from the portfolio to view its demo case study.</p>' +
          '<a class="btn btn--primary" href="index.html#portfolio" style="margin-top:20px">View projects</a></div>';
        return;
      }

      document.title = project.title + " — VoxelBox (Demo Case Study)";
      var grad = "linear-gradient(135deg, " + esc(project.accent) + " 0%, rgba(61,139,255,0.55) 100%)";
      var results = cs.results.map(function (r) { return "<li>" + esc(r) + "</li>"; }).join("");
      var tools = cs.tools.map(function (t) { return '<span class="tag">' + esc(t) + "</span>"; }).join("");

      function block(title, inner) {
        return '<div class="cs-block"><h4>' + esc(title) + "</h4>" + inner + "</div>";
      }

      mount.innerHTML =
        '<div class="modal-hero" style="background:' + grad + '">' +
          '<span class="badge-demo" style="position:static;display:inline-block">Demo Case Study</span>' +
          "<h3 style=\"font-size:1.8rem;margin-block:12px\">" + esc(project.title) + "</h3>" +
          '<p style="color:rgba(255,255,255,0.92);max-width:60ch">' + esc(project.blurb) + "</p>" +
        "</div>" +
        '<div class="modal-body">' +
          block("Problem", "<p>" + esc(cs.problem) + "</p>") +
          block("Solution", "<p>" + esc(cs.solution) + "</p>") +
          block("Results", '<ul class="cs-results">' + results + "</ul>" +
            '<p class="cs-note">Results shown are illustrative demo figures to show the shape of an engagement — not measured outcomes from a real client.</p>') +
          block("Tools Used", '<div class="tags">' + tools + "</div>") +
          '<a class="btn btn--primary" href="index.html#contact">Start a project like this</a>' +
        "</div>";
    });
  </script>
</body>
</html>
